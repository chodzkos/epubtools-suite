name: Build epubTools Suite

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate icon
        run: python create_icon.py

      - name: Build EXE
        run: python -m PyInstaller epubtools_suite.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: epubTools_Suite
          path: dist/epubTools_Suite.exe
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/epubTools_Suite.exe
